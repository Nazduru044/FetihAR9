<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İstanbul'un Fethi AR Deneyimi</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }

        /* Başlangıç Ekranı (Ses ve Kamera izni için) */
        #giris-ekrani {
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); 
            color: white;
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            align-items: center; 
            z-index: 10000; 
            text-align: center;
        }

        #giris-ekrani h1 {
            color: #f1c40f; 
            margin-bottom: 10px;
        }

        #basla-btn {
            background: #e74c3c; 
            color: white; 
            border: none;
            padding: 16px 45px; 
            font-size: 1.1rem; 
            border-radius: 50px;
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.4);
            margin-top: 20px;
        }

        #basla-btn:hover { background: #c0392b; transform: scale(1.05); }
        #basla-btn:active { transform: scale(0.95); }

        /* Tarama Uyarısı */
        #tarama-mesaji {
            position: fixed; 
            bottom: 40px; 
            left: 50%; 
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7); 
            color: white; 
            padding: 12px 25px;
            border-radius: 30px; 
            font-size: 14px; 
            z-index: 9999; 
            display: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="giris-ekrani">
        <h1>İstanbul'un Fethi AR</h1>
        <p style="opacity: 0.8;">Kamera izni verin ve deneyimi başlatmak için dokunun.</p>
        <button id="basla-btn">DENEYİMİ BAŞLAT</button>
    </div>

    <div id="tarama-mesaji">Kamerayı hedefe doğru tutun...</div>

    <a-scene mindar-image="imageTargetSrc: ./video_resim/fetih.mind;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="fetih-video" 
               src="./video_resim/istanbul_fetih.mp4" 
               preload="auto" 
               loop="true" 
               crossorigin="anonymous" 
               playsinline 
               webkit-playsinline>
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-hedef" mindar-image-target="targetIndex: 0">
        <a-video src="#fetih-video" width="1" height="0.56" position="0 0 0"></a-video>
      </a-entity>
      
    </a-scene>

    <script>
        const video = document.querySelector('#fetih-video');
        const hedef = document.querySelector('#ar-hedef');
        const girisEkrani = document.querySelector('#giris-ekrani');
        const baslaButonu = document.querySelector('#basla-btn');
        const taramaMesaji = document.querySelector('#tarama-mesaji');

        let arAktif = false;

        // Başlat butonuna tıklandığında
        baslaButonu.addEventListener('click', () => {
            // Tarayıcı otomatik ses kilidini açmak için boş oynatma
            video.play().then(() => {
                video.pause();
                video.currentTime = 0; 
            }).catch(e => console.log("Oynatma hatası:", e));

            girisEkrani.style.display = 'none'; 
            taramaMesaji.style.display = 'block'; 
            arAktif = true;
        });

        // Hedef Resim kameraya GİRDİĞİNDE
        hedef.addEventListener('targetFound', () => {
            if(arAktif) {
                taramaMesaji.style.display = 'none';
                video.play(); 
            }
        });

        // Hedef Resim kameradan ÇIKTIĞINDA
        hedef.addEventListener('targetLost', () => {
            if(arAktif) {
                video.pause(); 
                taramaMesaji.style.display = 'block'; 
            }
        });
    </script>
</body>
</html>
